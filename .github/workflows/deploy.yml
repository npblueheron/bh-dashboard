name: Deploy BH Dashboard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm ci

      - run: npm run build

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli@1.1.6

      - name: Deploy
        run: |
          swa deploy ./dist \
            --api-location ./api \
            --deployment-token "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_POND_052FBEB0F }}" \
            --api-language node \
            --api-version 16 \
            --env production
